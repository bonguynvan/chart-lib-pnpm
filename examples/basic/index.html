<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeCanvas -- Basic Example</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-elevated: #111118;
      --border: #1e1e2e;
      --text: #e1e1e6;
      --text-muted: #6b6b7b;
      --text-dim: #a1a1aa;
      --accent: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 12px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
    }
    .separator {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }
    .btn-group { display: flex; gap: 2px; }
    .btn {
      padding: 4px 8px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .btn.active { background: var(--accent); color: #fff; }
    select {
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    #chart-container {
      width: 100%;
      height: calc(100vh - 40px);
    }

    /* Light theme overrides */
    body.light {
      --bg: #f8f8fa;
      --bg-elevated: #ffffff;
      --border: #e0e0e8;
      --text: #1a1a2e;
      --text-muted: #8888a0;
      --text-dim: #555566;
      --accent: #2563eb;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>TradeCanvas</h1>
    <div class="separator"></div>

    <select id="symbol">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT" selected>ETH/USDT</option>
      <option value="SOLUSDT">SOL/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
    </select>

    <div class="separator"></div>

    <div class="btn-group" id="timeframes">
      <button class="btn" data-tf="1m">1m</button>
      <button class="btn active" data-tf="5m">5m</button>
      <button class="btn" data-tf="15m">15m</button>
      <button class="btn" data-tf="1h">1H</button>
      <button class="btn" data-tf="4h">4H</button>
      <button class="btn" data-tf="1d">1D</button>
    </div>

    <div class="separator"></div>

    <select id="chart-type">
      <option value="candlestick">Candlestick</option>
      <option value="line">Line</option>
      <option value="area">Area</option>
      <option value="bar">Bar (OHLC)</option>
      <option value="heikinAshi">Heikin Ashi</option>
      <option value="hollowCandle">Hollow Candle</option>
      <option value="baseline">Baseline</option>
    </select>

    <div class="separator"></div>

    <div class="btn-group" id="indicators">
      <button class="btn" id="btn-sma">SMA</button>
      <button class="btn" id="btn-ema">EMA</button>
      <button class="btn" id="btn-bb">BB</button>
      <button class="btn" id="btn-rsi">RSI</button>
      <button class="btn" id="btn-macd">MACD</button>
    </div>

    <div class="separator"></div>

    <button class="btn" id="btn-theme">Theme</button>
    <button class="btn" id="btn-screenshot">Screenshot</button>
  </div>

  <div id="chart-container"></div>

  <script type="module">
    // npm: import { Chart, BinanceAdapter, DARK_THEME, LIGHT_THEME } from '@tradecanvas/chart'
    import {
      Chart,
      BinanceAdapter,
      DARK_THEME,
      LIGHT_THEME,
    } from '../../packages/library/src/index.ts';

    // -- Create chart --------------------------------------------------------

    const container = document.getElementById('chart-container');
    let isDark = true;

    const chart = new Chart(container, {
      chartType: 'candlestick',
      theme: DARK_THEME,
      autoScale: true,
      rightMargin: 5,
      crosshair: { mode: 'magnet' },
      watermark: { text: 'TradeCanvas', fontSize: 48, color: 'rgba(255,255,255,0.03)' },
      features: {
        drawings: true,
        drawingMagnet: true,
        drawingUndoRedo: true,
        indicators: true,
        trading: true,
        volume: true,
        legend: true,
        crosshair: true,
        keyboard: true,
        screenshot: true,
        alerts: true,
        barCountdown: true,
        logScale: true,
        watermark: true,
      },
    });

    // -- Connect to Binance --------------------------------------------------

    let currentSymbol = 'ETHUSDT';
    let currentTf = '5m';

    async function connectStream() {
      chart.disconnectStream();
      const adapter = new BinanceAdapter();
      await chart.connect({
        adapter,
        symbol: currentSymbol,
        timeframe: currentTf,
        historyLimit: 500,
      });
      chart.setWatermark(currentSymbol.replace('USDT', '/USDT'), {
        fontSize: 48,
        color: 'rgba(255,255,255,0.03)',
      });
    }
    connectStream();

    // -- Symbol selector -----------------------------------------------------

    document.getElementById('symbol').addEventListener('change', (e) => {
      currentSymbol = e.target.value;
      connectStream();
    });

    // -- Timeframe buttons ---------------------------------------------------

    document.getElementById('timeframes').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      document.querySelectorAll('#timeframes .btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      currentTf = btn.dataset.tf;
      connectStream();
    });

    // -- Chart type dropdown -------------------------------------------------

    document.getElementById('chart-type').addEventListener('change', (e) => {
      chart.setChartType(e.target.value);
    });

    // -- Indicator toggles ---------------------------------------------------

    const indicatorMap = {
      'btn-sma': 'sma',
      'btn-ema': 'ema',
      'btn-bb': 'bollinger',
      'btn-rsi': 'rsi',
      'btn-macd': 'macd',
    };
    const activeIndicators = new Map();

    Object.entries(indicatorMap).forEach(([btnId, indicatorId]) => {
      document.getElementById(btnId).addEventListener('click', (e) => {
        const btn = e.target;
        if (activeIndicators.has(indicatorId)) {
          chart.removeIndicator(activeIndicators.get(indicatorId));
          activeIndicators.delete(indicatorId);
          btn.classList.remove('active');
        } else {
          const instanceId = chart.addIndicator(indicatorId);
          if (instanceId) {
            activeIndicators.set(indicatorId, instanceId);
            btn.classList.add('active');
          }
        }
      });
    });

    // -- Theme toggle --------------------------------------------------------

    document.getElementById('btn-theme').addEventListener('click', () => {
      isDark = !isDark;
      chart.setTheme(isDark ? DARK_THEME : LIGHT_THEME);
      document.body.classList.toggle('light', !isDark);
    });

    // -- Screenshot ----------------------------------------------------------

    document.getElementById('btn-screenshot').addEventListener('click', () => {
      chart.screenshot();
    });
  </script>
</body>
</html>
