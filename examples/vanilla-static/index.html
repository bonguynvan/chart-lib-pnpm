<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeCanvas -- Static Data Example</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-elevated: #111118;
      --border: #1e1e2e;
      --text: #e1e1e6;
      --text-muted: #6b6b7b;
      --text-dim: #a1a1aa;
      --accent: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 12px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
    }
    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .separator {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }
    .btn-group { display: flex; gap: 2px; }
    .btn {
      padding: 4px 8px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .btn.active { background: var(--accent); color: #fff; }
    select {
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }
    #chart-container {
      width: 100%;
      height: calc(100vh - 40px);
    }

    /* Light theme overrides */
    body.light {
      --bg: #f8f8fa;
      --bg-elevated: #ffffff;
      --border: #e0e0e8;
      --text: #1a1a2e;
      --text-muted: #8888a0;
      --text-dim: #555566;
      --accent: #2563eb;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>TradeCanvas -- Static</h1>
    <div class="separator"></div>

    <div class="btn-group" id="chart-types">
      <span class="label">Type</span>
      <button class="btn active" data-type="candlestick">Candlestick</button>
      <button class="btn" data-type="line">Line</button>
      <button class="btn" data-type="area">Area</button>
      <button class="btn" data-type="heikinAshi">Heikin Ashi</button>
    </div>

    <div class="separator"></div>

    <div class="btn-group" id="indicators">
      <span class="label">Indicators</span>
      <button class="btn" id="btn-sma">SMA</button>
      <button class="btn" id="btn-ema">EMA</button>
      <button class="btn" id="btn-bb">BB</button>
      <button class="btn" id="btn-rsi">RSI</button>
      <button class="btn" id="btn-macd">MACD</button>
    </div>

    <div class="separator"></div>

    <div class="btn-group">
      <span class="label">Draw</span>
      <select id="drawing-tool">
        <option value="">Off</option>
        <option value="trendLine">Trend Line</option>
        <option value="horizontalLine">H-Line</option>
        <option value="rectangle">Rectangle</option>
        <option value="fibRetracement">Fib Retrace</option>
      </select>
    </div>

    <div class="separator"></div>

    <button class="btn" id="btn-theme">Theme</button>
    <button class="btn" id="btn-screenshot">Screenshot</button>
  </div>

  <div id="chart-container"></div>

  <script type="module">
    // npm: import { Chart, DARK_THEME, LIGHT_THEME } from '@tradecanvas/chart'
    import {
      Chart,
      DARK_THEME,
      LIGHT_THEME,
    } from '../../packages/library/src/index.ts';

    // -- Generate static OHLCV data (100 bars, 1h interval) ------------------

    function generateStaticData(barCount, startPrice, intervalSeconds) {
      const bars = [];
      const startTime = Math.floor(Date.now() / 1000) - barCount * intervalSeconds;
      let price = startPrice;

      for (let i = 0; i < barCount; i++) {
        const time = startTime + i * intervalSeconds;
        const open = price;
        const change = (Math.random() - 0.48) * 2.5;
        const close = Math.max(1, open + change);
        const high = Math.max(open, close) + Math.random() * 1.5;
        const low = Math.max(0.5, Math.min(open, close) - Math.random() * 1.5);
        const volume = 500 + Math.random() * 2000 + (Math.abs(change) > 1.5 ? 1500 : 0);

        bars.push({
          time,
          open: parseFloat(open.toFixed(2)),
          high: parseFloat(high.toFixed(2)),
          low: parseFloat(low.toFixed(2)),
          close: parseFloat(close.toFixed(2)),
          volume: parseFloat(volume.toFixed(0)),
        });
        price = close;
      }
      return bars;
    }

    const data = generateStaticData(100, 100, 3600);

    // -- Create chart --------------------------------------------------------

    const container = document.getElementById('chart-container');
    let isDark = true;

    const chart = new Chart(container, {
      chartType: 'candlestick',
      theme: DARK_THEME,
      autoScale: true,
      rightMargin: 5,
      crosshair: { mode: 'magnet' },
      watermark: { text: 'STATIC / USD', fontSize: 48, color: 'rgba(255,255,255,0.03)' },
      features: {
        drawings: true,
        drawingMagnet: true,
        drawingUndoRedo: true,
        indicators: true,
        trading: true,
        volume: true,
        legend: true,
        crosshair: true,
        keyboard: true,
        screenshot: true,
        logScale: true,
        watermark: true,
      },
    });

    // -- Load data + demo positions ------------------------------------------

    chart.setData(data);

    const lastBar = data[data.length - 1];

    chart.setPositions([
      {
        id: 'pos-1',
        side: 'buy',
        entryPrice: lastBar.close - 3,
        quantity: 10,
        stopLoss: lastBar.close - 8,
        takeProfit: lastBar.close + 6,
      },
    ]);

    chart.setOrders([
      {
        id: 'order-1',
        side: 'buy',
        type: 'limit',
        price: lastBar.close - 12,
        quantity: 5,
        label: 'LIMIT',
        draggable: true,
      },
    ]);

    // -- Chart type switcher -------------------------------------------------

    document.getElementById('chart-types').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      document.querySelectorAll('#chart-types .btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      chart.setChartType(btn.dataset.type);
    });

    // -- Indicator toggles ---------------------------------------------------

    const indicatorMap = {
      'btn-sma': 'sma',
      'btn-ema': 'ema',
      'btn-bb': 'bollinger',
      'btn-rsi': 'rsi',
      'btn-macd': 'macd',
    };
    const activeIndicators = new Map();

    Object.entries(indicatorMap).forEach(([btnId, indicatorId]) => {
      document.getElementById(btnId).addEventListener('click', (e) => {
        const btn = e.target;
        if (activeIndicators.has(indicatorId)) {
          chart.removeIndicator(activeIndicators.get(indicatorId));
          activeIndicators.delete(indicatorId);
          btn.classList.remove('active');
        } else {
          const instanceId = chart.addIndicator(indicatorId);
          if (instanceId) {
            activeIndicators.set(indicatorId, instanceId);
            btn.classList.add('active');
          }
        }
      });
    });

    // -- Drawing tool selector -----------------------------------------------

    document.getElementById('drawing-tool').addEventListener('change', (e) => {
      chart.setDrawingTool(e.target.value || null);
    });

    // -- Theme toggle --------------------------------------------------------

    document.getElementById('btn-theme').addEventListener('click', () => {
      isDark = !isDark;
      chart.setTheme(isDark ? DARK_THEME : LIGHT_THEME);
      document.body.classList.toggle('light', !isDark);
    });

    // -- Screenshot ----------------------------------------------------------

    document.getElementById('btn-screenshot').addEventListener('click', () => {
      chart.screenshot();
    });
  </script>
</body>
</html>
